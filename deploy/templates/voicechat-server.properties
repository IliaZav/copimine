# CopiMine managed Simple Voice Chat defaults.
# Offline-mode servers must explicitly set COPIMINE_ALLOW_INSECURE_OFFLINE_VOICECHAT=1
# and document COPIMINE_OFFLINE_VOICECHAT_EXCEPTION_REASON before this public binding is accepted.
port=24454
bind_address=*
max_voice_distance=48.0
whisper_distance=24.0
codec=VOIP
mtu_size=1024
keep_alive=1000
enable_groups=true
voice_host=mc.copimine.ru
allow_recording=false
spectator_interaction=false
spectator_player_possession=false
force_voice_chat=false
login_timeout=10000
broadcast_range=-1.0
allow_pings=false
