header-footer:
  enabled: true
  designs:
    default:
      header:
      - ""
      - "&f\uE300"
      - "&8┈┈┈┈┈┈┈┈┈┈┈┈┈┈"
      - "&fПрезидент: &a%copimine_president%"
      - "&fОнлайн: &a%online% &8| &fАдминистраторов: &b%staffonline%"
      - "&8┈┈┈┈┈┈┈┈┈┈┈┈┈┈"
      - "&fИгроки"
      - ""
      footer:
      - ""
      - "&8┈┈┈┈┈┈┈┈┈┈┈┈┈┈"
      - "&fTPS: &a%tps% &8| &fMSPT: &e%mspt% &8| &fPing: &a%ping% ms"
      - ""

tablist-name-formatting:
  enabled: true

scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  can-see-friendly-invisibles: false
  case-sensitive-sorting: true
  sorting-types:
  - GROUPS:owner,admin,president,cik_chair,curator,default
  - PLACEHOLDER_A_TO_Z:%player%

playerlist-objective:
  enabled: true
  value: "%ping%"
  fancy-value: "&a%ping% ms"
  title: "&fПинг"
  render-type: INTEGER

belowname-objective:
  enabled: false
  value: "%health%"
  fancy-value: "&c%health%"
  fancy-value-default: NPC
  title: "&cHealth"

bossbar:
  enabled: false
  toggle-command: /bossbar
  remember-toggle-choice: false
  hidden-by-default: false

layout:
  enabled: false
  direction: COLUMNS
  default-skin: mineskin:37e93c8e12cd426cb28fce31969e0674
  enable-remaining-players-text: true
  remaining-players-text: "... and %s more"
  empty-slot-ping-value: 1000

ping-spoof:
  enabled: false

placeholders:
  date-format: "dd.MM.yyyy"
  time-format: "HH:mm:ss"
  time-offset: 0
  register-tab-expansion: false

placeholder-output-replacements:
  "%essentials_vanished%":
    "yes": "&7| Vanished"
    "no": ""
  "%copimine_president%":
    "":
      "&6не выбран"
    "не выбран":
      "&6не выбран"
    "не избран":
      "&6не выбран"
    "none":
      "&6не выбран"
    "null":
      "&6не выбран"

assign-groups-by-permissions: false

primary-group-finding-list:
  - owner
  - admin
  - president
  - cik_chair
  - curator
  - default
