# CopiMineArtifacts
# Runtime settings are intentionally minimal.
# PostgreSQL credentials are loaded from /opt/copimine/admin-web/.env or COPIMINE_ENV_FILE.
# The catalog is stored in items.yml and synchronized to PostgreSQL on startup/reload.

debug_gui: false

performance:
  pending-hints-seconds: 60
  session-cleanup-seconds: 60
  session-ttl-seconds: 300

donation:
  # The installer synchronizes the active server copy from PUBLIC_PANEL_URL.
  website-base-url: "http://copimine.ru:18080"
  purchase-path-template: "/#donation-shop?item={item_id}"
  payment-path-template: "/#donation-balance?session={session_id}"
  qr-fallback-message: "Оплата доступна на сайте CopiMine. Открой ссылку и используй код сессии."
  max-history-rows: 18
  max-reclaim-rows: 18
  fixed-packs: [50, 100, 250, 500, 1000]

custom-block-visuals:
  # ItemDisplay overlays used the same paper model as the marker and could leave
  # visual strips behind after a chunk reload. Keep the shop block itself only.
  enabled: false
  models:
    ARTIFACT_SHOP:
      model-id: artifact_shop_marker
      custom-model-data: 14004
      scale: 1.01
      offset-y: 0.5
      label: "Лавка"
