server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name __COPIMINE_SERVER_NAMES__;
    return 301 https://$host$request_uri;
}

server {
    # Keep the existing HTTP endpoint working while TLS is enabled on 443.
    listen 18080 default_server;
    listen [::]:18080 default_server;
    server_name __COPIMINE_SERVER_NAMES__;
    client_max_body_size 8m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name __COPIMINE_SERVER_NAMES__;
    client_max_body_size 8m;

    ssl_certificate __COPIMINE_TLS_CERT_PATH__;
    ssl_certificate_key __COPIMINE_TLS_KEY_PATH__;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }
}
