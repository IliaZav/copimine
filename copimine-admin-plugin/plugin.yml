name: CopiMineUltimateAdminPlus
version: '9.2.0-postgres-v4-balance-credit'
main: me.copimine.ultimateplus.CopiMineUltimateAdminPlus
api-version: '1.21'
author: SudoKillDash9
load: POSTWORLD
libraries:
  - org.postgresql:postgresql:42.7.5
depend:
  - CopiMineEconomyCore
softdepend:
  - PlaceholderAPI
  - LuckPerms
  - Essentials
  - voicechat
  - CopiMineWorldCore
  - CopiMineElectionCore
commands:
  cmultra:
    description: "Панель управления сервером"
    usage: /cmultra
    aliases: [cm, cmplus, uadmin, ultraadmin, adminka]
  cadm:
    description: "Панель управления сервером"
    usage: /cadm
    aliases: [copimine, cadmin, cpanel, adminhub, cpa, cpadmin]
  ar:
    description: "Открыть раздел экономики"
    usage: /ar
    aliases: [ars, arreconomy, aradmin]
  cmbank:
    description: "Открыть раздел банка"
    usage: /cmbank
    aliases: [bank, cbank, bankar]
  cmcredit:
    description: "Admin balance credit for AR or donation"
    usage: /cmcredit <player> <ar|donation> <amount> [reason]
    aliases: [balanceadd, addbalance]
  appeal:
    description: "Отправить обращение администрации"
    usage: /appeal <problem>
    aliases: [adminrequest, request, helpadm]
  report:
    description: "Отправить жалобу"
    usage: /report <problem>
    aliases: [problem, helpme, ticket]
  reporta:
    description: "Сообщить о проблеме"
    usage: /reporta [bug-code] <problem>
    aliases: [bugreporta, bugreport]
  rpguard:
    description: "Проверить ограничения RP-команд"
    usage: /rpguard
    aliases: [cmrpguard, rpcommands]
  oldvoteoff:
    description: "Проверить состояние выборов"
    usage: /oldvoteoff status|reset|cleanglow|unlock
    aliases: [oldvotesoff, electionoff, oldelectionoff]
  cmsealdrop:
    description: "Удалить печать ЦИК из инвентаря"
    usage: /cmsealdrop trash|status
    aliases: [ciksealdrop, sealdrop]
permissions:
  copimine.admin:
    description: Полный доступ к управлению сервером
    default: op
  copimine.economy.admin:
    description: Управление экономикой
    default: op
  copimine.bank.admin:
    description: Управление банком и банкоматами
    default: op
  copimine.diagnostics:
    description: Просмотр служебного состояния
    default: op
  copimine.players.admin:
    description: Управление игроками
    default: op
  copimine.economy.credit:
    description: "Credit a player's AR or donation balance from the game"
    default: op
  copimine.players.check:
    description: Проверки игроков, freeze и возврат из проверки
    default: op
  copimine.database.maintenance:
    description: Обслуживание базы данных (ANALYZE и checkpoint)
    default: op
  copimine.reports.admin:
    description: Управление обращениями игроков
    default: op
  copimine.sidebar:
    description: Переключение панели выборов
    default: true
  copimine.rpguard.bypass:
    description: Обход ограничений RP-команд
    default: op
