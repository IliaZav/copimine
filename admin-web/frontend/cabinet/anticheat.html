<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>CopiMine - Античит</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <script src="/assets/js/theme/theme-bootstrap.js"></script>
  <link rel="stylesheet" href="/assets/cabinet.css?v=20260710r2" />
</head>
<body data-page-kind="cabinet" data-app-route="anticheat" data-boot-state="loading">
  <div id="toast" class="toast-root" aria-live="polite"></div>

  <header class="public-nav public-nav-auth">
    <a class="public-brand" href="/index.html" aria-label="CopiMine">
      <img class="public-brand-logo" src="/assets/brand/copimine-logo.png" alt="" />
      <span class="public-brand-copy">
        <strong>CopiMine</strong>
        <small>Личный кабинет и панель управления</small>
      </span>
    </a>
    <nav aria-label="Разделы сайта">
      <a href="/index.html">Главная</a>
      <a href="/server.html">Сервер</a>
      <a href="/shops.html">Лавки</a>
      <a href="/mods.html">Модпак</a>
      <a id="publicSigninLink" href="/signin.html" class="hidden">Войти</a>
      <a id="publicRegisterLink" href="/register.html" class="hidden">Регистрация</a>
      <button id="publicCabinetBtn" class="btn btn-secondary" type="button">Кабинет</button>
      <button id="publicLogoutBtn" class="btn btn-ghost" type="button">Выход</button>
      <button class="btn btn-ghost theme-toggle public-theme-toggle" data-theme-toggle="true" data-theme-toggle-compact="true" type="button">Тема</button>
    </nav>
  </header>

  <section id="bootStage" class="loading-shell" aria-live="polite" aria-busy="true">
    <div class="loading">Подготавливаем кабинет...</div>
  </section>

  <div id="app" class="app">
    <aside class="sidebar">
      <div class="side-brand">
        <a href="/index.html" aria-label="Вернуться на сайт">
          <img class="side-brand-logo" src="/assets/brand/copimine-logo.png" alt="" />
        </a>
        <div class="side-brand-copy">
          <strong>CopiMine</strong>
          <span id="userBadge">Загрузка</span>
        </div>
      </div>
      <nav id="nav" class="side-nav" aria-label="Разделы кабинета"></nav>
      <div class="side-footer">
        <div id="miniHealth" class="mini-health">Проверяем сервисы...</div>
        <button id="logout" class="btn btn-ghost btn-wide" type="button">Выйти</button>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <button id="mobileNavToggle" class="btn icon-btn mobile-only" type="button" aria-label="Открыть меню">&#9776;</button>
        <div class="page-heading">
          <h1 id="pageTitle">Античит</h1>
          <p id="pageSubtitle">Рабочие разделы, счета, история и игровые сервисы.</p>
        </div>
        <div class="top-actions">
          <button class="btn btn-ghost theme-toggle app-theme-toggle" data-theme-toggle="true" type="button">Тема</button>
          <button id="guestPagesBtn" class="btn btn-secondary" type="button">Сайт</button>
          <div id="liveBadge" class="status-chip status-neutral">...</div>
          <div id="lastUpdate" class="last-update">Данные не загружены</div>
          <button id="refreshBtn" class="btn btn-secondary" type="button">Обновить</button>
        </div>
      </header>

      <section id="view" class="view" aria-live="polite"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <script type="module" src="/assets/app.js"></script>
  <script src="/assets/js/cabinet-polish.js"></script>
</body>
</html>
