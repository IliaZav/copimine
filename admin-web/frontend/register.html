<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>CopiMine - Регистрация</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <script src="/assets/js/theme/theme-bootstrap.js"></script>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body data-page-kind="register" data-auth-flow="register" class="auth-screen">
  <div id="toast" class="toast-root" aria-live="polite"></div>

  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-card-head">
        <img class="auth-brand-logo" src="/assets/brand/copimine-logo.png" alt="" />
        <div class="auth-card-copy">
          <span class="auth-kicker">CopiMine</span>
          <h1>Регистрация</h1>
        </div>
      </div>

      <form id="loginForm" class="auth-form" autocomplete="on">
        <label for="username">Логин</label>
        <input id="username" autocomplete="username" spellcheck="false" placeholder="Придумайте логин" />

        <label for="password">Пароль</label>
        <input id="password" type="password" autocomplete="new-password" placeholder="Минимум 8 символов" />

        <div id="minecraftNameGroup">
          <label for="playerMinecraftName">Minecraft-ник</label>
          <input id="playerMinecraftName" autocomplete="nickname" spellcheck="false" placeholder="Например, Cells" />
        </div>

        <button type="submit" class="btn btn-primary btn-wide">Создать аккаунт</button>
        <div id="loginError" class="form-error"></div>
      </form>

      <div class="auth-links">
        <a href="/signin.html">Уже есть аккаунт? Войти</a>
      </div>
    </section>
  </main>

  <div id="modalRoot"></div>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
