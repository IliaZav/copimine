runtime:
  narcotic_version: 1
  strict_release_mode: true
  async_threads: 2
  async_queue_capacity: 512

database:
  schema_version: 1
  preload_brewing_cache_on_enable: true

cauldron:
  require_full_water: true
  clear_cauldron_on_completion: true
  drop_ingredients_on_break_or_water_loss: true

usage:
  consume_cooldown_seconds: 0
  usage_window_seconds: 900
  overdose_threshold: 100
  duration_override_seconds: 0
  clear_normal_effects_before_new_use: true
  milk_blocks_during_overdose: true
  zhuzevo_forces_overdose: false

textures:
  mode: VANILLA

client_bridge:
  enabled: true
  require_client_mod: false
  kick_if_missing_client: false
  handshake_timeout_seconds: 10
  prefer_client_visuals: true
  fallback_to_server_overlay: false
  fallback_to_particles: true

visuals:
  enabled: true
  mode: AUTO
  allow_client_mod_visuals: true
  allow_server_resource_pack_overlay: false
  allow_server_particle_fallback: true
  server_overlay:
    use_titles: false
    max_duration_seconds: 60
    clear_on_stop: true
  effects:
    DESATURATE: true
    COLOR_CONVOLVE: true
    SCAN_PINCUSHION: true
    GREEN_NOISE: true
    INVERT: true
    WOBBLE: true
    BLOBS: true
    PENCIL: true
    CHAOS: true

storage:
  allow_player_inventory: true
  allow_chest: true
  allow_barrel: true
  allow_shulker_box: true
  allow_ender_chest: true
  block_processing_inventories: true

messages:
  no_permission: "&cУ вас нет доступа."
  reload_ok: "&aCopiMineNarcotics обновлён."
  state_reset_ok: "&aСостояние наркотиков очищено."
  state_reset_need_confirm: "&eПовторите команду с &fconfirm&e, чтобы очистить только narcotics-состояние."
  selfcheck_ok: "&aПроверка CopiMineNarcotics завершена."
  visuals_enabled: "&aVisual runtime включён."
  visuals_disabled: "&eVisual runtime отключён. Работает только честный server fallback, если он разрешён."
  texture_mode_set: "&aРежим текстур: &f%s"
  visual_mode_set: "&aРежим визуала: &f%s"
  visual_effect_set: "&aЭффект &f%s&a: &f%s"
  item_given: "&aВыдано: &f%s&a -> &f%s"
  all_given: "&aИгроку &f%s&a выдан весь набор."
  player_not_found: "&cИгрок не найден или не в сети."
  unknown_item: "&cНеизвестный предмет."
  consume_cooldown: "&eПодождите ещё &f%s&e сек."
  processing_blocked: "&cГотовые RP-предметы нельзя класть в обработку и автоматику."
  old_runtime_disabled: "&cСтарый narcotics runtime отключён."

