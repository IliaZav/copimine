settings:
  allow-end: true
  warn-on-overload: true
  permissions-file: permissions.yml
  update-folder: update
  plugin-profiling: false
  connection-throttle: 4000
  query-plugins: true
  deprecated-verbose: default
  shutdown-message: Server closed
  minimum-api: none
  use-map-color-cache: true
chunk-gc:
  period-in-ticks: 600
aliases: now-in-commands.yml

# === CopiMine optimization block ===
spawn-limits:
  monsters: 35
  animals: 6
  water-animals: 3
  water-ambient: 3
  water-underground-creature: 3
  axolotls: 3
  ambient: 1

ticks-per:
  autosave: 6000
  animal-spawns: 400
  monster-spawns: 5
  water-spawns: 200
  water-ambient-spawns: 200
  water-underground-creature-spawns: 200
  axolotl-spawns: 200
  ambient-spawns: 400
# === End CopiMine optimization block ===
