# Президентский налог работает как добровольный платеж игрока.
# Сумма не копится: игрок сам оплачивает текущий период через сайт или банкомат.
# Последствия неуплаты остаются РП-сценарием и не исполняются кодом автоматически.
president-tax:
  enabled: true
  payment-interval-hours: 24
  min-amount-ar: 0
  max-amount-ar: 50
  recipient: "active_president"
