name: CopiMineNarcotics
version: '2.1.0-client-bridge'
main: me.copimine.narcotics.CopiMineNarcotics
api-version: '1.21'
author: CopiMine
load: POSTWORLD
libraries:
  - org.postgresql:postgresql:42.7.5
softdepend:
  - ProtocolLib
commands:
  cmnarcotics:
    description: Управление чёрным рынком
    usage: /cmnarcotics
    aliases: [narcotics]
  cmclient:
    description: Проверка игрового клиента
    usage: /cmclient
permissions:
  copimine.narcotics.admin:
    description: Полный доступ к чёрному рынку
    default: op
    children:
      copimine.narcotics.give: true
      copimine.narcotics.reload: true
      copimine.narcotics.reset: true
      copimine.narcotics.texture: true
      copimine.narcotics.visuals: true
      copimine.narcotics.selfcheck: true
      copimine.narcotics.clearoverdose: true
  copimine.narcotics.give:
    description: Выдача официальных RP-предметов
    default: op
  copimine.narcotics.reload:
    description: Перезагрузка чёрного рынка
    default: op
  copimine.narcotics.reset:
    description: Очистка состояния чёрного рынка
    default: op
  copimine.narcotics.texture:
    description: Управление режимом текстур и миграцией официальных предметов
    default: op
  copimine.narcotics.visuals:
    description: Управление визуальными эффектами
    default: op
  copimine.narcotics.selfcheck:
    description: Проверка визуальных эффектов
    default: op
  copimine.narcotics.clearoverdose:
    description: Снятие активной передозировки у игрока
    default: op
